<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Chấm Điểm Tiết Mục</title>
    
    <!-- Thêm thư viện SheetJS để hỗ trợ xuất file Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary-color: #007bff;
            --hover-color: #0056b3;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .judges-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        
        /* Chỉnh sửa layout cho các nút bấm */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-add { background-color: #28a745; }
        .btn-add:hover { background-color: #218838; }
        
        .btn-export { background-color: #17a2b8; }
        .btn-export:hover { background-color: #138496; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .rank-1 { color: #d4af37; font-weight: bold; font-size: 18px; }
        .rank-2 { color: #c0c0c0; font-weight: bold; font-size: 17px; }
        .rank-3 { color: #cd7f32; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Chấm Điểm & Xếp Hạng Tiết Mục</h2>
        
        <div class="form-group">
            <label for="perfName">Tên tiết mục:</label>
            <input type="text" id="perfName" placeholder="Nhập tên tiết mục...">
        </div>

        <div class="form-group">
            <label>Điểm 5 Giám khảo (Thang điểm 100):</label>
            <div class="judges-grid">
                <input type="number" id="gk1" min="0" max="100" placeholder="GK 1">
                <input type="number" id="gk2" min="0" max="100" placeholder="GK 2">
                <input type="number" id="gk3" min="0" max="100" placeholder="GK 3">
                <input type="number" id="gk4" min="0" max="100" placeholder="GK 4">
                <input type="number" id="gk5" min="0" max="100" placeholder="GK 5">
            </div>
        </div>

        <div class="form-group">
            <label for="audience">Điểm Khán giả (Lớn hơn 0):</label>
            <input type="number" id="audience" min="0.1" step="any" placeholder="Nhập điểm khán giả...">
        </div>

        <!-- Nhóm nút bấm -->
        <div class="button-group">
            <button class="btn-add" onclick="addPerformance()">Thêm & Tính Điểm</button>
            <button class="btn-export" onclick="exportToExcel()">Xuất File Excel</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Hạng</th>
                    <th>Tên Tiết Mục</th>
                    <th>GK 1</th>
                    <th>GK 2</th>
                    <th>GK 3</th>
                    <th>GK 4</th>
                    <th>GK 5</th>
                    <th>Khán Giả</th>
                    <th>Tổng Điểm</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                <!-- Dữ liệu render vào đây -->
            </tbody>
        </table>
    </div>

    <script>
        let performanceList = [];

        function addPerformance() {
            const name = document.getElementById('perfName').value.trim();
            const gk1 = parseFloat(document.getElementById('gk1').value);
            const gk2 = parseFloat(document.getElementById('gk2').value);
            const gk3 = parseFloat(document.getElementById('gk3').value);
            const gk4 = parseFloat(document.getElementById('gk4').value);
            const gk5 = parseFloat(document.getElementById('gk5').value);
            const audience = parseFloat(document.getElementById('audience').value);

            if (!name) {
                alert("Vui lòng nhập tên tiết mục!");
                return;
            }
            
            const judges = [gk1, gk2, gk3, gk4, gk5];
            if (judges.some(isNaN) || judges.some(score => score < 0 || score > 100)) {
                alert("Điểm của cả 5 giám khảo phải được nhập đầy đủ và nằm trong khoảng từ 0 đến 100!");
                return;
            }

            if (isNaN(audience) || audience <= 0) {
                alert("Điểm khán giả phải là một số lớn hơn 0!");
                return;
            }

            const totalJudges = gk1 + gk2 + gk3 + gk4 + gk5;
            const totalScore = (totalJudges * 0.7) + (audience * 0.3);

            performanceList.push({
                name: name,
                gk1: gk1,
                gk2: gk2,
                gk3: gk3,
                gk4: gk4,
                gk5: gk5,
                audience: audience,
                totalScore: totalScore
            });

            // Xóa rỗng form sau khi nhập
            document.getElementById('perfName').value = '';
            document.getElementById('gk1').value = '';
            document.getElementById('gk2').value = '';
            document.getElementById('gk3').value = '';
            document.getElementById('gk4').value = '';
            document.getElementById('gk5').value = '';
            document.getElementById('audience').value = '';

            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = ''; 

            performanceList.sort((a, b) => b.totalScore - a.totalScore);

            performanceList.forEach((perf, index) => {
                const rank = index + 1;
                
                let rankClass = "";
                if (rank === 1) rankClass = "rank-1";
                else if (rank === 2) rankClass = "rank-2";
                else if (rank === 3) rankClass = "rank-3";

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="${rankClass}">#${rank}</td>
                    <td><strong>${perf.name}</strong></td>
                    <td>${perf.gk1}</td>
                    <td>${perf.gk2}</td>
                    <td>${perf.gk3}</td>
                    <td>${perf.gk4}</td>
                    <td>${perf.gk5}</td>
                    <td>${perf.audience}</td>
                    <td style="color: red; font-weight: bold; font-size: 16px;">
                        ${perf.totalScore.toFixed(2)}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- TÍNH NĂNG XUẤT EXCEL MỚI THÊM ---
        function exportToExcel() {
            if (performanceList.length === 0) {
                alert("Bảng đang trống, hãy thêm tiết mục trước khi xuất Excel!");
                return;
            }

            // Chuẩn bị dữ liệu để xuất (đổi tên các cột sang tiếng Việt cho đẹp)
            const excelData = performanceList.map((perf, index) => ({
                "Thứ Hạng": index + 1,
                "Tên Tiết Mục": perf.name,
                "Giám Khảo 1": perf.gk1,
                "Giám Khảo 2": perf.gk2,
                "Giám Khảo 3": perf.gk3,
                "Giám Khảo 4": perf.gk4,
                "Giám Khảo 5": perf.gk5,
                "Khán Giả": perf.audience,
                "Tổng Điểm": parseFloat(perf.totalScore.toFixed(2)) // Chuyển về số để Excel có thể tính toán tiếp nếu cần
            }));

            // Tạo workbook và worksheet từ mảng dữ liệu
            const worksheet = XLSX.utils.json_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Bang Diem");

            // Tải file về máy
            XLSX.writeFile(workbook, "Bang_Diem_Tiet_Muc.xlsx");
        }
    </script>
</body>
</html>
